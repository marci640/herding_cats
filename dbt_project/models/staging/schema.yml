version: 2

models:
  # -----------------------------------------------------------------
  # MSSQL source tables (via dlt → raw schema — see A1, A2)
  # Column definitions are partial until first dlt extraction reveals
  # full schemas. SELECT * pattern used; PK placeholder pending.
  # -----------------------------------------------------------------
  - name: stg_cats
    description: "Staging model for cats table from MSSQL source. Loaded via dlt into raw schema."
    config:
      materialized: table
    columns:
      - name: processed_at
        description: "Runtime processing timestamp"
        data_type: TIMESTAMP
        tests:
          - not_null

  - name: stg_reviews
    description: "Staging model for reviews table from MSSQL source. Loaded via dlt into raw schema."
    config:
      materialized: table
    columns:
      - name: processed_at
        description: "Runtime processing timestamp"
        data_type: TIMESTAMP
        tests:
          - not_null

  - name: stg_seafood_restaurants
    description: "Staging model for seafood_restaurants table from MSSQL source. Loaded via dlt into raw schema."
    config:
      materialized: table
    columns:
      - name: processed_at
        description: "Runtime processing timestamp"
        data_type: TIMESTAMP
        tests:
          - not_null

  # -----------------------------------------------------------------
  # Seed source (local CSV — see A3)
  # -----------------------------------------------------------------
  - name: stg_restaurant_reviews
    description: "Staging model for restaurant_reviews seed CSV. Contains restaurant name, review text, and star rating."
    config:
      materialized: table
    columns:
      - name: review_id
        description: "Primary key — synthetic sequential ID for each review"
        data_type: INTEGER
        tests:
          - unique
          - not_null
      - name: restaurant_name
        description: "Name of the restaurant"
        data_type: VARCHAR
        tests:
          - not_null
      - name: review_text
        description: "Text content of the review"
        data_type: VARCHAR
      - name: star_rating
        description: "Star rating for the restaurant (integer)"
        data_type: INTEGER
        tests:
          - not_null
      - name: processed_at
        description: "Runtime processing timestamp"
        data_type: TIMESTAMP
        tests:
          - not_null

  # -----------------------------------------------------------------
  # S3 source (dogs.csv via httpfs — see A5)
  # Schema confirmed by direct S3 inspection.
  # -----------------------------------------------------------------
  - name: stg_dogs
    description: "Staging model for dogs.csv from S3 bucket cat-photos-2026. Read directly via DuckDB httpfs extension."
    config:
      materialized: table
    columns:
      - name: dog_id
        description: "Primary key — unique identifier for each dog"
        data_type: BIGINT
        tests:
          - unique
          - not_null
      - name: name
        description: "Name of the dog"
        data_type: VARCHAR
        tests:
          - not_null
      - name: age_years
        description: "Age of the dog in years"
        data_type: DOUBLE
      - name: favorite_toy
        description: "The dog's favorite toy"
        data_type: VARCHAR
      - name: judgmental_level
        description: "How judgmental the dog is (integer scale)"
        data_type: BIGINT
      - name: processed_at
        description: "Runtime processing timestamp"
        data_type: TIMESTAMP
        tests:
          - not_null
